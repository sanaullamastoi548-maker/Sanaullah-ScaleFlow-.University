<!-- ==========================================================
COURSES MODULE
Part 1A
========================================================== -->

<section id="courses-module" class="courses-module">

    <!-- Search -->
    <div id="courseSearchArea"></div>

    <!-- Filters -->
    <div id="courseFilterArea"></div>

    <!-- Featured Courses -->
    <div id="featuredCoursesArea"></div>

    <!-- Recommended Courses -->
    <div id="recommendedCoursesArea"></div>

    <!-- All Courses -->
    <div id="allCoursesArea"></div>

    <!-- Pagination -->
    <div id="paginationArea"></div>

</section>

<div class="course-search-box">

    <input
        type="text"
        id="courseSearchInput"
        placeholder="Search Courses...">

    <button
        id="courseSearchBtn"
        class="btn-primary">
        Search
    </button>

</div>

<div class="course-filter-box">

    <button class="course-filter active" data-filter="all">
        All
    </button>

    <button class="course-filter" data-filter="beginner">
        Beginner
    </button>

    <button class="course-filter" data-filter="intermediate">
        Intermediate
    </button>

    <button class="course-filter" data-filter="advanced">
        Advanced
    </button>

</div>
